name: src_detection
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ── Python ───────────────────────────────────────────────────────────────
  - python=3.10

  # ── PyTorch with CUDA 12.1 ───────────────────────────────────────────────
  # Change pytorch-cuda version to match your GPU driver if needed
  # e.g. pytorch-cuda=11.8 for older drivers
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - pytorch-cuda=12.1

  # ── Image processing ─────────────────────────────────────────────────────
  - pillow>=9.0.0

  # ── Configuration ────────────────────────────────────────────────────────
  - pyyaml>=6.0

  # ── pip-only packages ────────────────────────────────────────────────────
  - pip
  - pip:
    - ultralytics>=8.0.0    # YOLO26 — also installs numpy, opencv, tqdm,
                            # matplotlib, scipy as sub-dependencies
